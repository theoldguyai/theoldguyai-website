  :root {
    --red:    #ef3340;
    --red-d:  #b3122b;
    --yellow: #ffcf3f;
    --yellow-d:#dfa60f;
    --blue:   #3172d8;
    --blue-d: #1f4fa8;
    --ink:    #3b2a1c;
    --P: min(49.5vw, 46vh * 0.7, 300px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Quicksand', sans-serif;
    background:
      radial-gradient(circle at 12% 10%, rgba(239,51,64,0.10), transparent 32%),
      radial-gradient(circle at 88% 14%, rgba(49,114,216,0.12), transparent 32%),
      radial-gradient(circle at 50% 96%, rgba(255,207,63,0.16), transparent 38%),
      linear-gradient(175deg, #fffdf7, #fdf7ea 55%, #f2f6fd);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 0; overflow: hidden;
    color: var(--ink);
  }

  .logo { display: flex; align-items: flex-end; gap: 2px; margin-bottom: 4px;
    opacity: 0; animation: fadein 0.7s ease 0.2s forwards; }
  @keyframes fadein { to { opacity: 1; } }
  .bwrap { position: relative; animation: b-float 3s ease-in-out infinite; }
  .bwrap:nth-child(2) { animation-delay: 0.5s; z-index: 2; margin: 0 -6px; }
  .bwrap:nth-child(3) { animation-delay: 1s; }
  @keyframes b-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .balloon { width: 26px; height: 33px; border-radius: 50% 50% 50% 50% / 56% 56% 44% 44%; position: relative; }
  .balloon.red { background: radial-gradient(circle at 32% 26%, #ffb3ae 0%, #ff6b61 22%, var(--red) 55%, var(--red-d) 90%);
    box-shadow: 0 5px 12px rgba(239,51,64,0.45), inset -4px -6px 9px rgba(120,5,20,0.35), inset 3px 4px 6px rgba(255,255,255,0.5); }
  .balloon.yellow { background: radial-gradient(circle at 32% 26%, #fff3c2 0%, #ffe27a 22%, var(--yellow) 55%, var(--yellow-d) 90%);
    box-shadow: 0 5px 12px rgba(255,207,63,0.5), inset -4px -6px 9px rgba(150,105,0,0.3), inset 3px 4px 6px rgba(255,255,255,0.6); }
  .balloon.blue { background: radial-gradient(circle at 32% 26%, #bcd4ff 0%, #6fa0ec 22%, var(--blue) 55%, var(--blue-d) 90%);
    box-shadow: 0 5px 12px rgba(49,114,216,0.45), inset -4px -6px 9px rgba(10,40,110,0.35), inset 3px 4px 6px rgba(255,255,255,0.5); }
  .balloon::before { content:''; position: absolute; top: 12%; left: 18%; width: 34%; height: 26%;
    background: linear-gradient(150deg, rgba(255,255,255,0.95), rgba(255,255,255,0.05)); border-radius: 50%; transform: rotate(-22deg); }
  .balloon::after { content:''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 7px solid currentColor; }
  .balloon.red::after { color: var(--red-d); } .balloon.yellow::after { color: var(--yellow-d); } .balloon.blue::after { color: var(--blue-d); }
  .string { position: absolute; top: 100%; left: 50%; width: 10px; height: 18px;
    border-left: 1.5px solid rgba(59,42,28,0.4); border-radius: 0 0 0 90%; margin-top: 5px; }
  .wordmark { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 0.9rem; margin-bottom: 8px; font-size: 0.78rem;
    opacity: 0; animation: fadein 0.7s ease 0.4s forwards; }
  .wordmark .r { color: var(--red); } .wordmark .y { color: var(--yellow-d); } .wordmark .b { color: var(--blue); }

  /* ══ SPREAD — big when closed, glides + settles to centered spread ══ */
  .stage { perspective: 2300px; }
  .wrap {
    position: relative;
    width: calc(var(--P) * 2);
    height: calc(var(--P) * 4.3 / 3);

const REGISTRY = {
  balloon_kids: {
    img: ART_BALLOON, doodle: '🎈', style: 'bold',
    msg: (n) => `${n}! Today the balloons fly for YOU. Wishing you a day stuffed with cake, giggles, and every single wish coming true.`,
  },
  comic_fun: {
    img: ART_COMIC, doodle: '💥', style: 'bold',
    msg: (n) => `KA-POW, ${n}! Another year of being absolutely legendary. Go celebrate like the superhero you are!`,
  },
  demo_sentimental: {
    img: null, bg: 'linear-gradient(160deg,#ff6b61,#ef3340 55%,#b3122b)',
    doodle: '🌹', style: 'script',
    msg: (n) => `${n}, another year of you is the best gift the rest of us get. Have a beautiful day.`,
  },
};

const card = REGISTRY[CARDID] || REGISTRY.balloon_kids;
const front = document.getElementById('front');
if (card.img) {
  front.style.backgroundImage = `url('${card.img}')`;
  document.getElementById('cover-text').style.display = 'none';
  document.getElementById('cover-sub').style.display = 'none';
} else {
  front.style.background = card.bg;
  document.getElementById('cover-sub').textContent = 'FOR ' + TO.toUpperCase();
}
document.getElementById('doodle').textContent = card.doodle;
const msgEl = document.getElementById('inside-msg');
msgEl.className = 'msg ' + card.style;
msgEl.textContent = card.msg(TO);
document.getElementById('signed').textContent = FROM ? `— ${FROM}` : '';

// Envelope intro choreography
const envCard = document.getElementById('env-card');
if (card.img) { envCard.style.backgroundImage = `url('${card.img}')`; }
else { envCard.style.background = card.bg; }

const wrapEl = document.getElementById('wrap');
wrapEl.classList.remove('arriving');           // card waits for the envelope
wrapEl.style.opacity = '0';

setTimeout(() => document.getElementById('env-wrap').classList.add('env-open'), 1300);  // flap lifts, card rises
setTimeout(() => {                                                                       // envelope fades, real card arrives
  document.getElementById('env-scene').classList.add('done');
  wrapEl.style.opacity = '';
  wrapEl.classList.add('arriving');
}, 3100);

let opened = false;
let focusTimer = null;
let finaleTimer = null, backTimer = null;

// Back of card: sender credit + hat confetti
document.getElementById('back-sender').textContent = FROM || 'Someone special';
(function spawnHatBits(){
  const zone = document.getElementById('hat-zone');
  const colors = ['#ef3340','#ffcf3f','#3172d8'];
  const stars = ['★','✦','✶'];
  for (let i=0;i<20;i++) {
    const b = document.createElement('span');
    const color = colors[i % 3];
    const kind = i % 4;                      // 0,1 dots · 2 star · 3 squiggle
    if (kind === 2) {
      b.className = 'hat-bit starbit';
      b.textContent = stars[i % 3];
      b.style.color = color;
    } else if (kind === 3) {
      b.className = 'hat-bit squigbit';
      b.innerHTML = '<svg width="18" height="9" viewBox="0 0 18 9"><path d="M1 5 Q 4 1 7 5 T 13 5 T 17 5" fill="none" stroke="' + color + '" stroke-width="2.2" stroke-linecap="round"/></svg>';
    } else {
      b.className = 'hat-bit dotbit';
      b.style.background = color;
    }
    b.style.setProperty('--hx', (Math.random()*190 - 95) + 'px');
    b.style.setProperty('--hy', -(85 + Math.random()*75) + 'px');
    b.style.setProperty('--dur', (1.3 + Math.random()*0.7) + 's');
    b.style.animationDelay = (Math.random()*1.7) + 's';
    zone.appendChild(b);
  }
})();

function startFinale() {
  document.body.classList.remove('focused');
  document.body.classList.remove('opened');            // card closes in reverse
  backTimer = setTimeout(() => document.body.classList.add('back-shown'), 2000);  // then flips to the back
}
let autoTimer = setTimeout(openNow, (3.1 + 1.0 + HOLD_SECONDS) * 1000);

function openNow() {
  if (opened) return;
  opened = true;
  clearTimeout(autoTimer);
  
  const w = document.getElementById('wrap');
  w.classList.remove('arriving'); w.classList.add('arrived');
  document.body.classList.add('opened');
  setTimeout(() => confettiBurst(window.innerWidth/2, window.innerHeight/2.5), 1100);
  focusTimer = setTimeout(() => document.body.classList.add('focused'), 1900 + 1500);
  finaleTimer = setTimeout(startFinale, 1900 + 1500 + 1900 + 3000);
}
function replay() {
  opened = false;
  clearTimeout(focusTimer); clearTimeout(finaleTimer); clearTimeout(backTimer);
  document.body.classList.remove('opened');
  document.body.classList.remove('focused');
  document.body.classList.remove('back-shown');
  
  autoTimer = setTimeout(openNow, (HOLD_SECONDS + 0.6) * 1000);
}
function confettiBurst(cx, cy) {
  const colors = ['#ef3340','#ffcf3f','#3172d8'];
  const emojis = ['🎈','🎉','⭐'];
  for (let i=0;i<32;i++) {
    const s = document.createElement('span');
    if (Math.random() < 0.65) {
      s.className = 'confetti-bit dot';
      s.style.background = colors[Math.floor(Math.random()*colors.length)];
    } else {
      s.className = 'confetti-bit';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.fontSize = '1.05rem';
    }
    const ang = Math.random()*Math.PI*2;
    const dist = 110 + Math.random()*220;
    s.style.left = cx+'px'; s.style.top = cy+'px';
    s.style.setProperty('--dx', Math.cos(ang)*dist + 'px');
    s.style.setProperty('--dy', (Math.sin(ang)*dist + 140) + 'px');
    s.style.setProperty('--rot', (Math.random()*720-360)+'deg');
    s.style.animationDuration = (0.9 + Math.random()*0.9) + 's';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 2200);
  }
}
</script>
